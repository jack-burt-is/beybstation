<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:210px}@import url("https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@500;700&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Voice · do / don't</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:'Space Grotesk',sans-serif">
    <div style="padding:12px;background:rgba(0,240,255,0.05);border-left:4px solid var(--bey-cyan)">
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--bey-cyan);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:6px">do</div>
      <div style="color:var(--fg1);font-weight:700;text-transform:uppercase;font-family:'Bungee',sans-serif;font-size:18px;margin-bottom:4px">Round 1. Let's go.</div>
      <div style="color:var(--fg2);font-size:13px">16 spinners. One winner.</div>
    </div>
    <div style="padding:12px;background:rgba(230,57,70,0.06);border-left:4px solid var(--bey-red)">
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--bey-red);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:6px">don't</div>
      <div style="color:var(--fg2);font-size:14px;font-weight:500;margin-bottom:4px">Welcome to Beybstation Event 2 🎉</div>
      <div style="color:var(--fg3);font-size:13px">A single-elimination beyblade competition</div>
    </div>
  </div>
</div></body></html>
