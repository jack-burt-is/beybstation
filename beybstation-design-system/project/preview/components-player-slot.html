<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:130px}@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Player slot</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-family:'Space Grotesk',sans-serif">
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-card);border:2px solid var(--border);border-radius:8px">
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em;width:20px">01</span>
      <span style="color:var(--fg1);font-weight:500">Player 1</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-card);border:2px solid var(--bey-pink);border-radius:8px;box-shadow:0 0 12px rgba(255,30,142,0.3)">
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--bey-pink);letter-spacing:0.1em;width:20px">02</span>
      <input value="Spinmaster" style="background:transparent;border:none;color:var(--fg1);font-family:inherit;font-size:14px;font-weight:500;outline:none;width:100%">
    </div>
  </div>
</div></body></html>
