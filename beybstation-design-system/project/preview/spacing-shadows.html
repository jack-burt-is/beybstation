<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:200px}</style>
</head><body><div class="card">
  <div class="card-label">Shadows · hard offset + neon glow</div>
  <div class="row" style="gap:32px;padding:14px 0 20px 0">
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <div style="width:96px;height:60px;background:var(--bey-pink);box-shadow:6px 6px 0 var(--bey-black);margin-bottom:14px"></div>hard · 6 6 0 black
    </div>
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <div style="width:96px;height:60px;background:var(--bey-white);box-shadow:6px 6px 0 var(--bey-pink);margin-bottom:14px"></div>hard · 6 6 0 pink
    </div>
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <div style="width:96px;height:60px;background:var(--bey-pink);box-shadow:0 0 24px rgba(255,30,142,.6),0 0 48px rgba(255,30,142,.35);margin-bottom:14px"></div>glow · pink
    </div>
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <div style="width:96px;height:60px;background:var(--bey-cyan);box-shadow:0 0 24px rgba(0,240,255,.6),0 0 48px rgba(0,240,255,.3);margin-bottom:14px"></div>glow · cyan
    </div>
  </div>
</div></body></html>
