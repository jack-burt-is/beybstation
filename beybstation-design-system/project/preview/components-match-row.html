<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:180px}@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=VT323&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Match row · bracket component</div>
  <div style="display:flex;flex-direction:column;gap:8px;font-family:'Space Grotesk',sans-serif">
    <div style="display:grid;grid-template-columns:80px 1fr auto 1fr auto;gap:14px;align-items:center;padding:12px 16px;background:var(--bg-card);border-left:5px solid var(--bey-pink)">
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--bey-pink);letter-spacing:0.18em;text-transform:uppercase">match 1</span>
      <span style="color:var(--bey-cyan);font-weight:700">Player 1</span>
      <span style="font-family:'VT323',monospace;font-size:24px;color:var(--bey-pink)">4 - 1</span>
      <span style="color:var(--fg3);font-weight:500">Player 2</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.18em;text-transform:uppercase">edit</span>
    </div>
    <div style="display:grid;grid-template-columns:80px 1fr auto 1fr auto;gap:14px;align-items:center;padding:12px 16px;background:var(--bg-card);border-left:5px solid var(--border)">
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg3);letter-spacing:0.18em;text-transform:uppercase">match 2</span>
      <span style="color:var(--fg1);font-weight:500">Player 3</span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--fg3);letter-spacing:0.18em;text-transform:uppercase">add score</span>
      <span style="color:var(--fg1);font-weight:500">Player 4</span>
      <span></span>
    </div>
  </div>
</div></body></html>
