<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:220px}@import url("https://fonts.googleapis.com/css2?family=Bungee&family=VT323&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Score · CRT</div>
  <div class="row" style="gap:36px;align-items:center;justify-content:center;height:100%">
    <div style="text-align:center;font-family:'Bungee',sans-serif;text-transform:uppercase;color:var(--fg1)">
      <div style="font-size:18px">Player 1</div>
      <div style="font-family:'VT323',monospace;font-size:90px;line-height:1;color:var(--bey-cyan);text-shadow:0 0 16px rgba(0,240,255,.6)">4</div>
    </div>
    <div style="font-family:'VT323',monospace;font-size:64px;color:var(--fg3)">-</div>
    <div style="text-align:center;font-family:'Bungee',sans-serif;text-transform:uppercase;color:var(--fg3)">
      <div style="font-size:18px">Player 2</div>
      <div style="font-family:'VT323',monospace;font-size:90px;line-height:1;color:var(--bey-pink);text-shadow:0 0 16px rgba(255,30,142,.6)">1</div>
    </div>
  </div>
</div></body></html>
