<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:180px}.row{display:flex;flex-wrap:nowrap}.swatch{flex:1;width:auto}</style>
</head><body><div class="card">
  <div class="card-label">Core palette · the trio</div>
  <div class="row" style="gap:0">
    <div class="swatch" style="background:#0A0A0F;border:2px solid #2B2738"><span class="name">black</span><span class="hex">#0A0A0F</span></div>
    <div class="swatch" style="background:#FF1E8E;border:none"><span class="name" style="color:#0A0A0F">pink</span><span class="hex" style="color:#0A0A0F">#FF1E8E</span></div>
    <div class="swatch" style="background:#FAF7F2;border:none" data-on-light><span class="name">white</span><span class="hex">#FAF7F2</span></div>
    <div class="swatch" style="background:#15131C;border:2px solid #2B2738"><span class="name">ink</span><span class="hex">#15131C</span></div>
    <div class="swatch" style="background:#1C1925;border:2px solid #2B2738"><span class="name">bg-card</span><span class="hex">#1C1925</span></div>
    <div class="swatch" style="background:#E8E1D4;border:none" data-on-light><span class="name">bone</span><span class="hex">#E8E1D4</span></div>
  </div>
</div></body></html>
