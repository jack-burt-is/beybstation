<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:200px}</style>
</head><body><div class="card">
  <div class="card-label">Semantic tokens</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-family:var(--font-mono);font-size:12px">
    <div class="row"><div style="width:18px;height:18px;background:#FF1E8E"></div><b>--accent</b> <span style="color:var(--fg3)">primary action / focus</span></div>
    <div class="row"><div style="width:18px;height:18px;background:#00F0FF"></div><b>--winner</b> <span style="color:var(--fg3)">match winner glow</span></div>
    <div class="row"><div style="width:18px;height:18px;background:#E63946"></div><b>--live</b> <span style="color:var(--fg3)">on air / recording</span></div>
    <div class="row"><div style="width:18px;height:18px;background:#F5E14B"></div><b>--warn</b> <span style="color:var(--fg3)">hazard / caution</span></div>
    <div class="row"><div style="width:18px;height:18px;background:#FAF7F2;border:1px solid #333"></div><b>--fg1</b> <span style="color:var(--fg3)">primary text</span></div>
    <div class="row"><div style="width:18px;height:18px;background:#847C92"></div><b>--fg3</b> <span style="color:var(--fg3)">tertiary / placeholder</span></div>
  </div>
</div></body></html>
