<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:180px}@import url("https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@500;700&display=swap");
  .btn{font-family:'Bungee',Impact,sans-serif;text-transform:uppercase;font-size:14px;letter-spacing:0.04em;border:none;cursor:pointer;padding:14px 22px;border-radius:0;display:inline-flex;align-items:center;gap:8px}
  .btn.primary{background:var(--bey-pink);color:#0A0A0F;box-shadow:6px 6px 0 var(--bey-black)}
  .btn.secondary{background:transparent;color:var(--bey-pink);border:3px solid var(--bey-pink)}
  .btn.ghost{background:transparent;color:var(--fg2);padding:14px 8px}
  .btn.disabled{opacity:0.3}</style>
</head><body><div class="card">
  <div class="card-label">Buttons</div>
  <div class="row" style="gap:18px;flex-wrap:wrap;align-items:flex-start">
    <button class="btn primary">START ROUND 1</button>
    <button class="btn secondary">CANCEL</button>
    <button class="btn ghost">&lt; BACK</button>
    <button class="btn primary disabled">DISABLED</button>
  </div>
</div></body></html>
