<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:180px}</style>
</head><body><div class="card">
  <div class="card-label">Spacing · 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 96</div>
  <div style="display:flex;align-items:flex-end;gap:12px;height:96px">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:4px;height:4px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">4</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:8px;height:8px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">8</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:12px;height:12px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">12</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:16px;height:16px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">16</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:24px;height:24px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">24</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:32px;height:32px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">32</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:48px;height:48px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">48</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:64px;height:64px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">64</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:96px;height:96px;background:var(--bey-pink)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">96</div>
      </div>
  </div>
</div></body></html>
