<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:170px}@import url("https://fonts.googleapis.com/css2?family=Bungee&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Card recipe · ingredients</div>
  <div class="row" style="gap:24px;align-items:center">
    <div style="background:var(--bg-card);border:2px solid var(--bey-pink);box-shadow:6px 6px 0 var(--bey-black);padding:18px 22px;font-family:'Bungee',sans-serif;text-transform:uppercase;color:var(--fg1);font-size:18px">
      Beybstation #2
    </div>
    <ul style="font-family:var(--font-mono);font-size:11px;color:var(--fg2);letter-spacing:0.06em;line-height:1.7;list-style:none">
      <li><span style="color:var(--bey-pink)">→</span> bg-card #1C1925</li>
      <li><span style="color:var(--bey-pink)">→</span> 2px pink border</li>
      <li><span style="color:var(--bey-pink)">→</span> 6px hard black shadow</li>
      <li><span style="color:var(--bey-pink)">→</span> 0 radius</li>
    </ul>
  </div>
</div></body></html>
