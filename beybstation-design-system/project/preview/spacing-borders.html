<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:160px}</style>
</head><body><div class="card">
  <div class="card-label">Borders · chunky, never hairline</div>
  <div class="row" style="gap:20px">
    <div style="width:120px;height:60px;border:2px solid var(--bey-pink);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg2)">2px</div>
    <div style="width:120px;height:60px;border:3px solid var(--bey-pink);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg2)">3px</div>
    <div style="width:120px;height:60px;border:5px solid var(--bey-pink);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg2)">5px</div>
    <div style="width:120px;height:60px;border:2px dashed var(--bey-pink);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg2)">dashed</div>
  </div>
</div></body></html>
