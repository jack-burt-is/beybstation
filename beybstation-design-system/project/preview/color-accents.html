<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:170px}.row{display:flex;flex-wrap:nowrap}.swatch{flex:1;width:auto}</style>
</head><body><div class="card">
  <div class="card-label">Accents · use rare and loud</div>
  <div class="row" style="gap:0">
    <div class="swatch" style="background:#00F0FF"  data-on-light><span class="name">cyan</span><span class="hex">#00F0FF</span></div>
    <div class="swatch" style="background:#F5E14B" data-on-light><span class="name">yellow</span><span class="hex">#F5E14B</span></div>
    <div class="swatch" style="background:#FF6B1A"><span class="name">orange</span><span class="hex">#FF6B1A</span></div>
    <div class="swatch" style="background:#E63946"><span class="name">red</span><span class="hex">#E63946</span></div>
    <div class="swatch" style="background:#B7FF1A" data-on-light><span class="name">acid</span><span class="hex">#B7FF1A</span></div>
  </div>
</div></body></html>
