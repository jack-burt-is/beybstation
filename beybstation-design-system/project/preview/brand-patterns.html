<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:170px}</style>
</head><body><div class="card">
  <div class="card-label">Patterns · pure-CSS textures</div>
  <div class="row" style="gap:14px">
    <div style="width:140px;height:90px;background:repeating-linear-gradient(45deg,#F5E14B 0 14px,#0A0A0F 14px 28px);position:relative">
      <div style="position:absolute;bottom:6px;left:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:#0A0A0F;text-transform:uppercase">hazard</div>
    </div>
    <div style="width:140px;height:90px;background:repeating-conic-gradient(#0A0A0F 0 90deg,#FAF7F2 90deg 180deg);background-size:24px 24px;position:relative">
      <div style="position:absolute;bottom:6px;left:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--bey-pink);text-transform:uppercase">finish</div>
    </div>
    <div style="width:140px;height:90px;background:var(--bey-black) repeating-linear-gradient(to bottom,rgba(255,255,255,0.06) 0 1px,transparent 1px 3px);position:relative;border:1px solid #2B2738">
      <div style="position:absolute;bottom:6px;left:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--bey-pink);text-transform:uppercase">scanlines</div>
    </div>
    <div style="width:140px;height:90px;background:linear-gradient(135deg,#F5E14B,#FF6B1A 45%,#E63946 75%,#FF1E8E);position:relative">
      <div style="position:absolute;bottom:6px;left:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:#0A0A0F;text-transform:uppercase">flame</div>
    </div>
  </div>
</div></body></html>
