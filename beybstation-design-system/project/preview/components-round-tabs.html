<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:130px}@import url("https://fonts.googleapis.com/css2?family=Bungee&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Round tabs</div>
  <div style="display:flex;gap:0;font-family:'Bungee',Impact,sans-serif;text-transform:uppercase;font-size:13px;letter-spacing:0.04em">
    <div style="padding:12px 18px;background:var(--bey-pink);color:#0A0A0F;box-shadow:0 0 16px rgba(255,30,142,0.5)">Round 1</div>
    <div style="padding:12px 18px;background:transparent;color:var(--fg2);border-bottom:2px solid var(--border)">Round 2</div>
    <div style="padding:12px 18px;background:transparent;color:var(--fg3);border-bottom:2px solid var(--border)">Semi-finals</div>
    <div style="padding:12px 18px;background:transparent;color:var(--fg3);border-bottom:2px solid var(--border)">Final</div>
  </div>
</div></body></html>
