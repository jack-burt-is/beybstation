<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:180px}@import url("https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@500;700&display=swap");
  .btn{font-family:'Bungee',Impact,sans-serif;text-transform:uppercase;font-size:14px;letter-spacing:0.04em;border:none;cursor:pointer;padding:14px 22px;border-radius:0;display:inline-flex;align-items:center;gap:8px}
  .btn.primary{background:var(--bey-pink);color:#0A0A0F;box-shadow:6px 6px 0 var(--bey-black)}
  .btn.secondary{background:transparent;color:var(--bey-pink);border:3px solid var(--bey-pink)}
  .btn.ghost{background:transparent;color:var(--fg2);padding:14px 8px}
  .btn.disabled{opacity:0.3}</style>
</head><body><div class="card">
  <div class="card-label">Primary · default / hover / press</div>
  <div class="row" style="gap:20px;align-items:flex-start">
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <button class="btn primary" style="margin-bottom:10px">FINISH MATCH</button><div>default</div>
    </div>
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <button class="btn primary" style="background:#FF4FA8;transform:translate(-2px,-2px);box-shadow:8px 8px 0 var(--bey-black),0 0 24px rgba(255,30,142,0.6);margin-bottom:10px">FINISH MATCH</button><div>hover</div>
    </div>
    <div style="text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:0.1em">
      <button class="btn primary" style="background:#C8005F;transform:scale(0.97);box-shadow:2px 2px 0 var(--bey-black);margin-bottom:10px">FINISH MATCH</button><div>press</div>
    </div>
  </div>
</div></body></html>
