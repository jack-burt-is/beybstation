<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:130px}@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap");</style>
</head><body><div class="card">
  <div class="card-label">Status badges</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;font-family:'Space Grotesk',sans-serif;font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:0.18em">
    <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bey-red);color:#fff;border-radius:999px"><span style="width:8px;height:8px;background:#fff;border-radius:999px;animation:bl 1s steps(2) infinite"></span>LIVE</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bey-pink);color:#0A0A0F;border-radius:999px">IN PROGRESS</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:transparent;color:var(--fg2);border:2px solid var(--border);border-radius:999px">WAITING</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bey-cyan);color:#0A0A0F;border-radius:999px">WINNER</span>
    <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:transparent;color:var(--fg3);border:2px solid var(--border);border-radius:999px">FINISHED</span>
  </div>
  <style>@keyframes bl{50%{opacity:0}}</style>
</div></body></html>
