<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>body{height:220px}</style>
</head><body><div class="card">
  <div class="card-label">Inputs</div>
  <div class="col" style="gap:14px">
    <input placeholder="Enter password..." style="width:100%;padding:14px 16px;background:transparent;border:2px solid var(--bey-pink);color:var(--fg1);font-family:var(--font-body);font-size:16px;border-radius:4px;outline:none">
    <input placeholder="Tournament name..." style="width:100%;padding:14px 16px;background:var(--bg-card);border:2px solid var(--border);color:var(--fg1);font-family:var(--font-body);font-size:16px;border-radius:4px;outline:none">
    <input value="Player 1" style="width:200px;padding:10px 12px;background:var(--bg-card);border:2px solid var(--bey-pink);color:var(--fg1);font-family:var(--font-body);font-size:14px;border-radius:4px;outline:none">
  </div>
</div></body></html>
